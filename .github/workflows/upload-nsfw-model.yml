name: Upload Flux Model to RunPod S3

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Stream Civitai → RunPod S3
        env:
          CIVITAI_TOKEN: ${{ secrets.CIVITAI_TOKEN }}
          RUNPOD_S3_ACCESS_KEY: ${{ secrets.RUNPOD_S3_ACCESS_KEY }}
          RUNPOD_S3_SECRET_KEY: ${{ secrets.RUNPOD_S3_SECRET_KEY }}
          RUNPOD_NETWORK_VOLUME_ID: ${{ secrets.RUNPOD_NETWORK_VOLUME_ID }}
        run: node scripts/stream-model-to-s3.mjs
