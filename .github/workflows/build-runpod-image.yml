name: Build RunPod ComfyUI Image

# Thin app layer on top of the pre-built base image.
# Still needs free-disk-space because pulling the large base image (~20GB+)
# can exhaust the runner's disk.
# Triggers on any infra/runpod/ change. Base-only file changes will also
# trigger this (harmlessly) to ensure the app image stays in sync.
#
# Branch behaviour:
#   main                  → pulls base :latest, pushes worker :latest + :sha-<7-char>,
#                           runs update-endpoint.sh (updates prod endpoint)
#   flux2-native-multiref → pulls base :multiref-latest, pushes worker :multiref-latest
#                           + :multiref-<sha>. NEVER touches :latest or prod endpoint.
on:
  push:
    paths:
      - 'infra/runpod/**'
    branches:
      - main
      - flux2-native-multiref
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version tag (e.g. v1.0.0)'
        required: false
        default: ''
      base_image:
        description: 'Base image override (e.g. ghcr.io/g858-debug/nsw-comfyui-base:sha-abc1234)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: g858-debug/nsw-comfyui-worker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Determine tags (main branch)
        id: tags_main
        if: github.ref == 'refs/heads/main'
        run: |
          TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.version }}"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Determine tags (flux2-native-multiref branch)
        id: tags_multiref
        if: github.ref == 'refs/heads/flux2-native-multiref'
        run: |
          TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:multiref-latest"
          TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:multiref-${{ github.sha }}"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Determine base image (main branch)
        id: base_main
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -n "${{ github.event.inputs.base_image }}" ]; then
            echo "image=${{ github.event.inputs.base_image }}" >> "$GITHUB_OUTPUT"
          else
            echo "image=ghcr.io/g858-debug/nsw-comfyui-base:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine base image (flux2-native-multiref branch)
        id: base_multiref
        if: github.ref == 'refs/heads/flux2-native-multiref'
        run: |
          if [ -n "${{ github.event.inputs.base_image }}" ]; then
            echo "image=${{ github.event.inputs.base_image }}" >> "$GITHUB_OUTPUT"
          else
            echo "image=ghcr.io/g858-debug/nsw-comfyui-base:multiref-latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push (main branch)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./infra/runpod
          file: ./infra/runpod/Dockerfile
          push: true
          tags: ${{ steps.tags_main.outputs.tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=min
          build-args: |
            BASE_IMAGE=${{ steps.base_main.outputs.image }}

      - name: Build and push (flux2-native-multiref branch)
        if: github.ref == 'refs/heads/flux2-native-multiref'
        uses: docker/build-push-action@v6
        with:
          context: ./infra/runpod
          file: ./infra/runpod/Dockerfile
          push: true
          tags: ${{ steps.tags_multiref.outputs.tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-multiref
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-multiref,mode=min
          build-args: |
            BASE_IMAGE=${{ steps.base_multiref.outputs.image }}

      - name: Update RunPod endpoint template
        if: github.ref == 'refs/heads/main'
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          CIVITAI_API_KEY: ${{ secrets.CIVITAI_API_KEY }}
          RUNPOD_ENDPOINT_ID: vj6jc0gd61l9ov
          RUNPOD_TEMPLATE_ID: b31bthjn1k
          DOCKER_IMAGE: ghcr.io/${{ env.IMAGE_NAME }}:latest
        run: bash infra/runpod/update-endpoint.sh
